    :root { --bg: #141413; --bg-2: #1e1e1c; --bg-3: #272725;

  body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); }

  h1 { font-size: 20px; font-weight: 600; }

  .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.4rem; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .week { border: 0.5px solid var(--border-strong); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
  .week-head { padding: 10px 14px; background: var(--bg-2); cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
  .week-head-left { display: flex; align-items: center; gap: 8px; }
  .week-num { font-size: 14px; font-weight: 600; }
  .week-range { font-size: 12px; color: var(--muted); }
  .phase-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; }
  .ph0 { background:#FDE8F0; color:#7C0C3A; }
  .ph1 { background:#F0E8FD; color:#4A0C7C; }
  .ph2 { background:#E8F4FD; color:#0C4A7C; }
  .ph3 { background:#E8FDF0; color:#0C7C3A; }
  .chevron { font-size: 11px; color: var(--muted); transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }
  .week-body { display: none; }
  .week-body.open { display: block; }
  .week-note { font-size: 11px; color: var(--muted); padding: 6px 14px; background: var(--bg-2); border-bottom: 0.5px solid var(--border); border-left: 2px solid var(--border-strong); }
  .day { border-bottom: 0.5px solid var(--border); padding: 10px 14px; }
  .day:last-child { border-bottom: none; }
  .day.today { background: var(--blue-bg); }
  .day.rest { background: var(--bg-2); }
  .day-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .day-name { font-size: 13px; font-weight: 600; }
  .day-date { font-size: 12px; color: var(--muted); }
  .today-pill { font-size: 10px; background: var(--blue); color: #fff; padding: 1px 7px; border-radius: 99px; }
  .rest-text { font-size: 12px; color: var(--muted); font-style: italic; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 2.5px 0; font-size: 12.5px; }
  td:first-child { color: var(--muted); }
  td:last-child { text-align: right; font-weight: 500; }
  .modifier { font-size: 11px; color: var(--muted); font-style: italic; margin-left: 3px; }
  .vol-footer { padding: 8px 14px; background: var(--bg-3); display: flex; align-items: center; justify-content: space-between; }
  .vol-label { font-size: 11px; color: var(--muted); }
  .vol-right { display: flex; align-items: center; gap: 10px; }
  .vol-num { font-size: 13px; font-weight: 600; }
  .vol-delta { font-size: 12px; font-weight: 500; }
  .up { color: #16a34a; } .down { color: #dc2626; } .neutral { color: var(--muted); }
  .fab-group { position: fixed; bottom: 1.2rem; right: 1.2rem; display: flex; flex-direction: column; gap: 6px; }
  .fab { width: 42px; height: 42px; border-radius: 50%; border: 0.5px solid var(--border-strong); background: var(--bg-2); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .fab:hover { background: var(--bg-3); }

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate() + n); return d; }
function formatDate(date) { return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', weekday: 'short' }); }
function isToday(date) { const t = new Date(); t.setHours(0,0,0,0); return date.getTime() === t.getTime(); }

function weekVolume(week) {
  let total = 0;
  week.pattern.forEach(type => {
    if (type === 'rest') return;
    (week[type] || []).forEach(ex => {
      const n = parseInt(ex.reps);
      if (!isNaN(n)) total += ex.sets * n;
    });
  });
  return total;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('plan');
  let dayOffset = 0;
  let todayDayEl = null;
  const allDayEls = [];
  const volumes = PLAN.weeks.map(weekVolume);

  PLAN.weeks.forEach((week, wi) => {
    const weekStartDate = addDays(PLAN.startDate, dayOffset);
    const weekEndDate = addDays(PLAN.startDate, dayOffset + 6);
    const vol = volumes[wi];
    const prevVol = wi > 0 ? volumes[wi - 1] : null;
    const deltaStr = prevVol
      ? (vol > prevVol
          ? `<span class="vol-delta up">↑ +${Math.round((vol - prevVol) / prevVol * 100)}%</span>`
          : vol < prevVol
            ? `<span class="vol-delta down">↓ −${Math.round((prevVol - vol) / prevVol * 100)}%</span>`
            : `<span class="vol-delta neutral">→ 0%</span>`)
      : '';

    let weekHasToday = false;
    week.pattern.forEach((_, di) => { if (isToday(addDays(PLAN.startDate, dayOffset + di))) weekHasToday = true; });

    const weekEl = document.createElement('div');
    weekEl.className = 'week';

    const headEl = document.createElement('div');
    headEl.className = 'week-head';
    headEl.innerHTML = `
      <div class="week-head-left">
        <span class="week-num">Неделя ${wi + 1}</span>
        <span class="phase-badge ${PLAN.phaseCls[week.phase]}">${PLAN.phases[week.phase]}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="week-range">${formatDate(weekStartDate)} — ${formatDate(weekEndDate)}</span>
        <span class="chevron ${weekHasToday ? 'open' : ''}">▼</span>
      </div>`;

    const bodyEl = document.createElement('div');
    bodyEl.className = `week-body${weekHasToday ? ' open' : ''}`;

    if (week.note) {
      const noteEl = document.createElement('div');
      noteEl.className = 'week-note';
      noteEl.textContent = week.note;
      bodyEl.appendChild(noteEl);
    }

    week.pattern.forEach((type, di) => {
      const date = addDays(PLAN.startDate, dayOffset + di);
      const today = isToday(date);
      const dayEl = document.createElement('div');
      dayEl.className = `day${today ? ' today' : ''}${type === 'rest' ? ' rest' : ''}`;

      if (type === 'rest') {
        dayEl.innerHTML = `
          <div class="day-head">
            <span class="day-name">День ${di + 1}</span>
            <span class="day-date">${formatDate(date)}</span>
            ${today ? '<span class="today-pill">Сегодня</span>' : ''}
          </div>
          <div class="rest-text">Отдых</div>`;
      } else {
        const rows = (week[type] || []).map(ex => {
          const mod = ex.modifier ? `<span class="modifier">${ex.modifier}</span>` : '';
          return `<tr><td>${ex.name}${mod}</td><td>${ex.sets} × ${ex.reps}</td></tr>`;
        }).join('');
        dayEl.innerHTML = `
          <div class="day-head">
            <span class="day-name">День ${di + 1}</span>
            <span class="day-date">${formatDate(date)}</span>
            ${today ? '<span class="today-pill">Сегодня</span>' : ''}
          </div>
          <table>${rows}</table>`;
      }

      bodyEl.appendChild(dayEl);
      allDayEls.push(dayEl);
      if (today) todayDayEl = dayEl;
    });

    const volFooter = document.createElement('div');
    volFooter.className = 'vol-footer';
    volFooter.innerHTML = `
      <span class="vol-label">Объём за неделю</span>
      <div class="vol-right">${deltaStr}<span class="vol-num">${vol.toLocaleString('ru')} повт.</span></div>`;
    bodyEl.appendChild(volFooter);

    headEl.addEventListener('click', () => {
      const isOpen = bodyEl.classList.contains('open');
      bodyEl.classList.toggle('open', !isOpen);
      headEl.querySelector('.chevron').classList.toggle('open', !isOpen);
    });

    weekEl.appendChild(headEl);
    weekEl.appendChild(bodyEl);
    container.appendChild(weekEl);
    dayOffset += 7;
  });

  window._allDayEls = allDayEls;
  window._todayDayEl = todayDayEl;
  if (todayDayEl) setTimeout(() => todayDayEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
}

function scrollToToday() {
  if (!window._todayDayEl) return;
  const wb = window._todayDayEl.closest('.week-body');
  if (wb) { wb.classList.add('open'); wb.previousElementSibling.querySelector('.chevron').classList.add('open'); }
  window._todayDayEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function navDay(delta) {
  const els = window._allDayEls;
  const center = window.innerHeight / 2;
  let currentIdx = 0, minDist = Infinity;
  els.forEach((el, i) => {
    const rect = el.getBoundingClientRect();
    const dist = Math.abs(rect.top + rect.height / 2 - center);
    if (dist < minDist) { minDist = dist; currentIdx = i; }
  });
  const target = els[Math.max(0, Math.min(els.length - 1, currentIdx + delta))];
  if (target) {
    const wb = target.closest('.week-body');
    if (wb) { wb.classList.add('open'); wb.previousElementSibling.querySelector('.chevron').classList.add('open'); }
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

render();
</script>
